<!-- Módulo: Detecciones YOLO — polling /api/events/latest cada 5s -->
<div id="detections-module">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
    <div>
      <h3 style="margin:0; font-size:16px; color:#fff;">Último evento por cámara</h3>
      <p style="margin:4px 0 0; font-size:12px; color:#888;">Actualización automática cada 5 segundos</p>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <span id="det-live-dot" style="width:8px;height:8px;border-radius:50%;background:#666;display:inline-block;"></span>
      <span id="det-live-label" style="font-size:12px; color:#888;">Conectando...</span>
    </div>
  </div>

  <!-- Grid de cámaras -->
  <div id="det-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:16px;">
    <div style="color:#666; font-size:14px; padding:20px;">Esperando datos del edge Ryzen...</div>
  </div>

  <!-- Historial reciente -->
  <div style="margin-top:24px;">
    <h3 style="font-size:15px; color:#fff; margin-bottom:12px;">Historial reciente (últimos 20 eventos)</h3>
    <div style="overflow-x:auto;">
      <table style="width:100%; border-collapse:collapse; font-size:13px;">
        <thead>
          <tr style="border-bottom:1px solid #333;">
            <th style="text-align:left; padding:8px; color:#888; font-weight:500;">Cámara</th>
            <th style="text-align:left; padding:8px; color:#888; font-weight:500;">Timestamp</th>
            <th style="text-align:left; padding:8px; color:#888; font-weight:500;">Detecciones</th>
            <th style="text-align:right; padding:8px; color:#888; font-weight:500;">Total</th>
          </tr>
        </thead>
        <tbody id="det-history"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
  import { apiGet } from '../../auth.js';

  const grid    = document.getElementById('det-grid');
  const history = document.getElementById('det-history');
  const dot     = document.getElementById('det-live-dot');
  const label   = document.getElementById('det-live-label');

  function formatTime(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleString('es-CL', { hour12: false });
  }

  function countsToStr(counts) {
    if (!counts || !Object.keys(counts).length) return 'Sin detecciones';
    return Object.entries(counts).map(([k, v]) => `${k}: ${v}`).join(', ');
  }

  function renderCard(ev) {
    return `
      <div style="background:#1e1e2e; border:1px solid #333; border-radius:8px; overflow:hidden;">
        ${ev.thumbnail
          ? `<img src="data:image/jpeg;base64,${ev.thumbnail}"
               style="width:100%; height:160px; object-fit:cover; display:block;"
               alt="Frame ${ev.camera_id}">`
          : `<div style="width:100%; height:160px; background:#111; display:flex; align-items:center; justify-content:center; color:#555; font-size:12px;">Sin thumbnail</div>`
        }
        <div style="padding:12px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <span style="font-weight:600; color:#fff; font-size:14px;">📹 ${ev.camera_id}</span>
            <span style="font-size:11px; color:#888;">${formatTime(ev.timestamp)}</span>
          </div>
          <div style="font-size:12px; color:#00C49A;">${countsToStr(ev.counts)}</div>
          <div style="font-size:11px; color:#666; margin-top:4px;">Total objetos: ${ev.total || 0}</div>
        </div>
      </div>`;
  }

  async function refresh() {
    try {
      const latest = await apiGet('api/events/latest');
      const recent = await apiGet('api/events?limit=20');

      // Estado live
      dot.style.background = '#00C49A';
      label.style.color    = '#00C49A';
      label.textContent    = `Actualizado ${new Date().toLocaleTimeString('es-CL')}`;

      // Grid
      if (latest && latest.length) {
        grid.innerHTML = latest.map(renderCard).join('');
      } else {
        grid.innerHTML = '<div style="color:#666; font-size:14px; padding:20px;">No hay eventos aún. Inicia el edge_detector.py en el Ryzen.</div>';
      }

      // Historial
      if (recent && recent.length) {
        history.innerHTML = recent.map(e => `
          <tr style="border-bottom:1px solid #222;">
            <td style="padding:8px; color:#ccc;">${e.camera_id}</td>
            <td style="padding:8px; color:#888; font-size:12px;">${formatTime(e.timestamp)}</td>
            <td style="padding:8px; color:#00C49A; font-size:12px;">${countsToStr(e.counts)}</td>
            <td style="padding:8px; text-align:right; color:#fff;">${e.total || 0}</td>
          </tr>`).join('');
      }
    } catch (err) {
      dot.style.background = '#EE5D50';
      label.style.color    = '#EE5D50';
      label.textContent    = 'Error al conectar';
    }
  }

  refresh();
  const _det_interval = setInterval(refresh, 5000);

  // Limpiar interval al salir del módulo
  document.getElementById('detections-module').addEventListener('remove', () => {
    clearInterval(_det_interval);
  });
</script>
