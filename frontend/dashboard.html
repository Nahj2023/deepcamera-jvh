<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepCamera Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="module-body">
  <div class="dashboard-container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">DC</div>
        <div class="sidebar-title">DeepCamera</div>
      </div>

      <nav class="nav-menu">
        <li class="nav-item">
          <button class="nav-link active" data-module="detections">
            🤖 Detecciones
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-module="alerts">
            🔔 Alertas
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-module="test-lab">
            🧪 Test Lab
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-module="customers">
            👥 Clientes
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-module="cameras">
            📹 Camaras
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-module="reports">
            📊 Reportes
          </button>
        </li>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-details">
            <div class="user-name" data-user-name>Admin</div>
            <div class="user-role" data-user-role>superadmin</div>
          </div>
        </div>
        <button class="secondary" style="width: 100%; border-color: #EE5D50; color: #EE5D50;" id="logoutBtn">
          Logout
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <!-- HEADER -->
      <header class="header">
        <div class="header-left">
          <div>
            <div class="header-title" id="pageTitle">Detecciones YOLO</div>
            <div class="header-subtitle" id="pageSubtitle">Eventos en tiempo real desde el edge</div>
          </div>

          <div class="kpi-bar">
            <div class="kpi">
              <div class="kpi-value" id="kpiDetections">0</div>
              <div class="kpi-label">Detecciones hoy</div>
            </div>
            <div class="kpi">
              <div class="kpi-value" id="kpiAlerts">0</div>
              <div class="kpi-label">Alertas hoy</div>
            </div>
            <div class="kpi">
              <div class="kpi-value" id="kpiCustomers">0</div>
              <div class="kpi-label">Clientes</div>
            </div>
          </div>
        </div>

        <div class="header-right">
          <div id="edgeStatus" style="display: flex; align-items: center; gap: 6px; font-size: 13px;">
            <span id="edgeDot" style="width:10px;height:10px;border-radius:50%;background:#666;display:inline-block;"></span>
            <span id="edgeLabel" style="color:#aaa;">Edge: —</span>
          </div>
        </div>
      </header>

      <!-- CONTENT AREA -->
      <div class="module-container">
        <iframe id="moduleFrame" style="display: none; width: 100%; height: 100%; border: none;"></iframe>
        <div id="moduleContent"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, getUser, logout, apiGet } from './auth.js';

    requireAuth();

    const user = getUser();
    if (user) {
      document.querySelector('[data-user-name]').textContent = user.username;
      document.querySelector('[data-user-role]').textContent = user.role;
      document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
    }

    document.getElementById('logoutBtn').addEventListener('click', logout);

    const modules = {
      detections: { title: 'Detecciones YOLO', subtitle: 'Eventos en tiempo real desde el edge', path: 'modules/detections/index.html' },
      alerts:     { title: 'Alertas',           subtitle: 'Feed en tiempo real',                  path: 'modules/alerts/list.html' },
      'test-lab': { title: 'Test Lab',           subtitle: 'Tus camaras de prueba',                path: 'modules/test-lab/index.html' },
      customers:  { title: 'Clientes',           subtitle: 'Empresas vigiladas',                   path: 'modules/customers/list.html' },
      cameras:    { title: 'Camaras',            subtitle: 'Estado de camaras',                    path: 'modules/cameras/list.html' },
      reports:    { title: 'Reportes',           subtitle: 'Exportar datos',                       path: 'modules/reports/index.html' }
    };

    async function loadModule(moduleName) {
      const module = modules[moduleName];
      if (!module) return;

      document.getElementById('pageTitle').textContent = module.title;
      document.getElementById('pageSubtitle').textContent = module.subtitle;

      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.dataset.module === moduleName);
      });

      const moduleContent = document.getElementById('moduleContent');
      try {
        const res = await fetch(module.path);
        if (res.ok) {
          moduleContent.innerHTML = await res.text();
          moduleContent.querySelectorAll('script').forEach(script => {
            const newScript = document.createElement('script');
            newScript.type = script.type || 'module';
            newScript.textContent = script.textContent;
            moduleContent.appendChild(newScript);
          });
        }
      } catch (err) {
        moduleContent.innerHTML = `<div class="card"><p style="color: #EE5D50;">Error al cargar modulo: ${err.message}</p></div>`;
      }
    }

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', () => loadModule(link.dataset.module));
    });

    loadModule('detections');

    // KPIs — actualizar cada 15s
    async function updateKPIs() {
      try {
        const [alerts, customers, events] = await Promise.allSettled([
          apiGet('api/alerts'),
          apiGet('api/customers'),
          apiGet('api/events?limit=200')
        ]);

        if (alerts.status === 'fulfilled' && alerts.value) {
          const alertsToday = alerts.value.filter(a =>
            new Date(a.created_at).toDateString() === new Date().toDateString()
          ).length;
          document.getElementById('kpiAlerts').textContent = alertsToday;
        }

        if (customers.status === 'fulfilled' && customers.value) {
          document.getElementById('kpiCustomers').textContent = customers.value.length;
        }

        if (events.status === 'fulfilled' && events.value) {
          const detectionsToday = events.value
            .filter(e => new Date(e.created_at).toDateString() === new Date().toDateString())
            .reduce((sum, e) => sum + (e.total || 0), 0);
          document.getElementById('kpiDetections').textContent = detectionsToday;
        }
      } catch (err) {
        console.error('KPI update error:', err);
      }
    }

    updateKPIs();
    setInterval(updateKPIs, 15000);

    // Indicador estado edge (sin JWT)
    async function updateEdgeStatus() {
      try {
        const res = await fetch('api/edge-status');
        if (!res.ok) return;
        const data = await res.json();
        const dot   = document.getElementById('edgeDot');
        const label = document.getElementById('edgeLabel');
        if (data.status === 'online') {
          dot.style.background = '#00C49A';
          label.style.color = '#00C49A';
          label.textContent = `Edge: online (${(data.cameras || []).join(', ') || '—'})`;
        } else if (data.status === 'offline') {
          dot.style.background = '#EE5D50';
          label.style.color = '#EE5D50';
          label.textContent = 'Edge: offline';
        } else {
          dot.style.background = '#666';
          label.style.color = '#aaa';
          label.textContent = 'Edge: sin datos';
        }
      } catch {
        // silencioso
      }
    }

    updateEdgeStatus();
    setInterval(updateEdgeStatus, 30000);
  </script>
</body>
</html>
